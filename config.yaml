data:
  raw_path: data/beijing_air_quality.csv
  test_size: 0.2
  val_size: 0.1
  random_state: 42
  target_column: "PM2.5"
  split_strategy: time
  time_columns: ["year", "month", "day", "hour"]

features:
  drop_columns: ["No", "PM10", "SO2", "NO2", "CO", "O3"]

model:
  name: xgboost
  params:
    n_estimators: 500
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 1.0
    random_state: 42
    tree_method: hist

optuna:
  n_trials: 30
  direction: minimize
  metric: rmse

mlflow:
  experiment_name: aqi_prediction
  tracking_uri: sqlite:///mlflow.db

artifacts:
  model_path: models/best_model.pkl
  preprocessor_path: models/preprocessor.pkl
  feature_names_path: models/feature_names.json
